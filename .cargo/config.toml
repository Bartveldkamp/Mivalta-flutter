# Force Cargo to use the system `git` binary (not libgit2) for git
# dependencies. libgit2 can't read ~/.gitconfig credential helpers
# or the SSH agent reliably; the system git already has the founder's
# credentials configured. Required for the gatc-ffi git-rev pin in
# rust/Cargo.toml to resolve in both dev and CI.
[net]
git-fetch-with-cli = true
