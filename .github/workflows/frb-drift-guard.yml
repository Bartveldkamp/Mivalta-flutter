name: FRB drift-guard

# Layer-3 guard (2026-06-17), HOST-ONLY by design.
#
# Regenerates the flutter_rust_bridge bindings from rust/src/api.rs and FAILS if
# the committed lib/src/rust/* or rust/src/frb_generated.rs differ from what
# codegen produces. Catches the stale-binding class — shim/engine-pin moved but
# bindings not regenerated — in seconds, so it can never again surface as a
# cryptic runtime hash-mismatch ("expected i32") chased on the simulator.
#
# WHY ITS OWN JOB, NOT INSIDE smoke-build: frb codegen parses the shim on the
# HOST to generate bindings — it needs neither the Android NDK nor the
# SQLCipher-for-Android cross-compile. smoke-build's Android cross-compile has a
# separate, parked OpenSSL/SQLCipher gap (iOS-first; Android off the critical
# path); coupling the guard to it would block a validated guard for an unrelated
# reason. This job goes green on exactly what the guard needs (host codegen),
# which is the same path the working host + iOS builds use.
#
# Needs RUST_ENGINE_DEPLOY_KEY (SSH) to resolve the private gatc-ffi git dep so
# codegen can see the shim's types. Skips with a notice if unset (same pattern
# as smoke-build.yml).
#
# Validated both directions on the Mac (2026-06-17): clean tree -> empty diff
# (no toolchain/format false-positive); shim probe -> codegen -> git diff exit 1
# (drift caught).

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  drift-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check for RUST_ENGINE_DEPLOY_KEY secret
        id: check_key
        env:
          KEY: ${{ secrets.RUST_ENGINE_DEPLOY_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            # M5: fail-closed on the protected branch. A missing key on push:main
            # means the guard cannot run — it must NOT report green having checked
            # nothing (the silent skip-green hole). On pull_request (incl. forks
            # without the secret) keep the documented skip-with-notice.
            if [ "${{ github.event_name }}" = "push" ]; then
              echo "::error::RUST_ENGINE_DEPLOY_KEY not set on a push to a protected branch — the drift-guard cannot run and must not pass silently. Set the SSH deploy key in repo secrets."
              exit 1
            fi
            echo "::notice::RUST_ENGINE_DEPLOY_KEY not set — skipping drift-guard on this event (need the SSH deploy key to resolve the private gatc-ffi dep for codegen)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check_key.outputs.skip == 'false'
        uses: actions/checkout@v4

      - name: Set up SSH for rust-engine git dep
        if: steps.check_key.outputs.skip == 'false'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.RUST_ENGINE_DEPLOY_KEY }}

      - name: Set up Flutter (pinned to match the committed bindings' toolchain)
        if: steps.check_key.outputs.skip == 'false'
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.0'

      - name: Host build deps (OpenSSL headers for the SQLCipher dep on host)
        if: steps.check_key.outputs.skip == 'false'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config perl

      - name: flutter pub get
        if: steps.check_key.outputs.skip == 'false'
        run: flutter pub get

      - name: Install flutter_rust_bridge_codegen (pinned 2.12.0)
        if: steps.check_key.outputs.skip == 'false'
        run: cargo install flutter_rust_bridge_codegen --version 2.12.0 --locked

      - name: Regenerate bindings and assert the Dart contract has no drift
        if: steps.check_key.outputs.skip == 'false'
        run: |
          # Assert ONLY on lib/src/rust/ — the Dart bindings are the
          # consumer-facing contract and are toolchain-stable (frb's Dart output
          # + the pinned dart format). rust/src/frb_generated.rs is deliberately
          # NOT checked: it is produced by `cargo expand`, whose output depends
          # on the rustc / cargo-expand version, so it diffs harmlessly between
          # CI and the toolchain that generated the committed copy (a false
          # positive — observed 2026-06-17: 182-line frb_generated.rs diff while
          # lib/src/rust was clean). The real drift class — shim/pin moved, Dart
          # facade calls stale bindings ("expected i32") — surfaces in
          # lib/src/rust/; a genuinely stale rust glue fails the build, not here.
          flutter_rust_bridge_codegen generate
          if ! git diff --quiet -- lib/src/rust; then
            echo "::error::FRB Dart bindings are stale — codegen changed lib/src/rust/. Run scripts/build_ios.sh (or 'flutter_rust_bridge_codegen generate') and commit lib/src/rust/."
            git --no-pager diff --stat -- lib/src/rust
            exit 1
          fi
          echo "FRB Dart bindings match the shim — no drift."
