name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel a superseded analyze/test run on the same PR (push-to-main never
# cancels). Distinct group prefix from the smoke workflow so the two never
# cancel each other.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test

      # Fabrication lint — catches Charter Rule 3 violations (hardcoded
      # placeholders masquerading as real data). The real bug that triggered
      # this: `?? 600` as a fake loadCeiling, `'Sunny 18°'` as fake weather.
      - name: Fabrication lint
        run: |
          set +e
          VIOLATIONS=0

          # Pattern 1: `?? <non-zero>` — arbitrary fallback values (the 600 bug)
          # `?? 0` in models/ is legitimate JSON parsing; non-zero is suspicious
          if grep -rn --include='*.dart' -E '\?\? [1-9][0-9]*' lib/; then
            echo "::error::Found '?? <non-zero>' pattern — likely fabrication (Charter Rule 3)"
            VIOLATIONS=$((VIOLATIONS + 1))
          fi

          # Pattern 2: Hardcoded weather strings (the 'Sunny 18°' bug)
          if grep -rn --include='*.dart' -E "'(Sunny|Cloudy|Rainy|Windy|Snowy|Clear)[^']*[0-9]+°'" lib/; then
            echo "::error::Found hardcoded weather string — use real data or honest absence"
            VIOLATIONS=$((VIOLATIONS + 1))
          fi

          # Pattern 3: `?? 0` outside models/ is suspicious (screens/widgets
          # should use honest null, not zero-as-default)
          if grep -rn --include='*.dart' -E '\?\? 0[^.]' lib/screens/ lib/widgets/ 2>/dev/null; then
            echo "::warning::Found '?? 0' in UI code — prefer honest null over zero-fallback"
          fi

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "::error::$VIOLATIONS fabrication pattern(s) detected — fix before merge"
            exit 1
          fi
          echo "Fabrication lint: OK"

  # F5: Integration test — runs corridor_guard_test on macOS with iOS simulator.
  # Root cause of #175 miss: a guard that never runs isn't a guard.
