name: Smoke build

# Reproducibility gate. Runs on every PR and every push to main.
# Verifies that a fresh checkout:
#   1. Resolves the gatc-ffi git-rev pin (requires `RUST_ENGINE_DEPLOY_KEY`
#      secret — SSH read-only deploy key on mivalta-rust-engine).
#   2. Cross-compiles the rust shim for aarch64-linux-android.
#   3. Passes flutter analyze + flutter test on the host.
#   4. Builds a debug arm64 APK with libmivalta_rust_bridge.so packed.
#
# The workflow needs SSH auth because mivalta-rust-engine is private;
# the deploy key must be created on rust-engine (Settings → Deploy keys
# → Add deploy key, read-only) with its private half stored as the
# `RUST_ENGINE_DEPLOY_KEY` secret here. If the secret is unset the
# workflow no-ops with a clear notice (mirrors the claude-review.yml
# skip-on-missing-key pattern from Day 1).

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANDROID_NDK_HOME: ${{ github.workspace }}/ndk
    steps:
      - name: Check for RUST_ENGINE_DEPLOY_KEY secret
        id: check_key
        env:
          KEY: ${{ secrets.RUST_ENGINE_DEPLOY_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            # M5: fail-closed on the protected branch. A missing key on push:main
            # means this gate cannot run — it must NOT report green having checked
            # nothing (the silent skip-green hole). On pull_request (incl. forks
            # without the secret) keep the documented skip-with-notice.
            if [ "${{ github.event_name }}" = "push" ]; then
              echo "::error::RUST_ENGINE_DEPLOY_KEY not set on a push to a protected branch — the smoke build cannot run and must not pass silently. Set the SSH deploy key in repo secrets."
              exit 1
            fi
            echo "::notice::RUST_ENGINE_DEPLOY_KEY not set — skipping smoke build on this event (rust-engine is private; need SSH deploy key on this repo's secrets)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check_key.outputs.skip == 'false'
        uses: actions/checkout@v4

      - name: Set up SSH for rust-engine git dep
        if: steps.check_key.outputs.skip == 'false'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.RUST_ENGINE_DEPLOY_KEY }}

      - name: Set up Java 17
        if: steps.check_key.outputs.skip == 'false'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        if: steps.check_key.outputs.skip == 'false'
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.0'

      - name: Set up Rust + Android target
        if: steps.check_key.outputs.skip == 'false'
        run: |
          rustup target add aarch64-linux-android
          cargo install --locked cargo-ndk || true

      - name: Set up Android NDK 27
        if: steps.check_key.outputs.skip == 'false'
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          # r27 (current stable) not r28: the floating action + a poisoned
          # local-cache for r28 left CC_aarch64-linux-android pointing at a
          # clang that was never installed (smoke failed deterministically).
          # The build only needs a working NDK for `cargo ndk --platform 21
          # arm64`; r27 is universally action-supported and uses a fresh cache
          # key. (Smallest consistent fix; no r28 requirement in the build.)
          #
          # local-cache:false — the runner's local NDK cache could be restored
          # with CC_aarch64-linux-android set but the clang binary absent (the
          # "clang not found" smoke failure). false forces a clean download so
          # the toolchain is always complete. (Folds in PR #103.)
          ndk-version: r27
          local-cache: false

      - name: flutter pub get
        if: steps.check_key.outputs.skip == 'false'
        run: flutter pub get

      - name: Cargo build (verifies git-rev pin resolves)
        if: steps.check_key.outputs.skip == 'false'
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          cd rust
          cargo ndk --target arm64-v8a --platform 21 -- check --release

      - name: flutter analyze
        if: steps.check_key.outputs.skip == 'false'
        run: flutter analyze

      - name: flutter test
        if: steps.check_key.outputs.skip == 'false'
        run: flutter test

      - name: Build debug APK + drop shim .so into jniLibs
        if: steps.check_key.outputs.skip == 'false'
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          cd rust
          cargo ndk --target arm64-v8a --platform 21 \
            --output-dir ../android/app/src/main/jniLibs \
            -- build --release
          # Drop the side-effect libgatc_ffi-<hash>.so from the git-dep
          # build — only libmivalta_rust_bridge.so is loaded at runtime.
          rm -f ../android/app/src/main/jniLibs/arm64-v8a/libgatc_ffi*.so
          cd ..
          flutter build apk --debug --target-platform android-arm64

      - name: Assert APK contains the expected native libs
        if: steps.check_key.outputs.skip == 'false'
        run: |
          APK=build/app/outputs/flutter-apk/app-debug.apk
          test -f "$APK" || { echo "APK missing at $APK"; exit 1; }
          unzip -l "$APK" | grep -q 'lib/arm64-v8a/libmivalta_rust_bridge\.so' \
            || { echo "::error::libmivalta_rust_bridge.so missing from APK"; exit 1; }
          # PR-J purge guard: the legacy LLM-spike native libs must NOT be
          # packed. The messenger (model W) ships via Play Asset Delivery,
          # never as bundled .so files.
          for so in libllama libggml libggml-base libggml-cpu libmtmd; do
            if unzip -l "$APK" | grep -q "lib/arm64-v8a/${so}\.so"; then
              echo "::error::${so}.so found in APK — purged legacy lib re-entered the build (PR-J)"; exit 1
            fi
          done
          unzip -l "$APK" | grep -q 'assets/flutter_assets/assets/compiled_tables\.json' \
            || { echo "::error::compiled_tables.json missing from APK"; exit 1; }
          echo "APK packaging: OK"
