name: mivalta_flutter
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.12.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # Filesystem access for vault persistence.
  path_provider: ^2.1.5

  # Rust-engine binding via flutter_rust_bridge.
  # Pinned to match the exact `flutter_rust_bridge` version in
  # rust/Cargo.toml so the codec is symmetric on both sides.
  flutter_rust_bridge: 2.12.0

  # FRB-generated BridgeError variants are emitted as freezed sealed
  # classes; the annotation lives at runtime.
  freezed_annotation: ^2.4.0

  # PR-D: Date formatting for manual entry screen.
  intl: ^0.19.0

  # PR-E: Health Connect (Android) + HealthKit (iOS) integration.
  # Cross-platform plugin for reading biometrics and activity from
  # the platform health stores. Dart shuttles raw JSON to the Rust
  # normalizer — no physiology transforms in Dart.
  health: ^11.1.0

  # PR-F: UUID generation for stable athlete_id in profile.
  uuid: ^4.5.1

  # PR-G: Share exported files via platform share sheet.
  share_plus: ^10.0.0

  # BS-002 v2: Local preferences storage (detail/gear, NOT engine payload).
  shared_preferences: ^2.2.3

  # Task A (input layer): BLE HR-strap pairing over the public Heart Rate
  # Service (0x180D / 0x2A37). Used ONLY by FlutterBlueTransport — all BLE
  # logic depends on the BleTransport interface, so session/decode/packaging is
  # unit-tested headless with a fake. Live pairing is device-lab verified.
  flutter_blue_plus: ^1.32.12

  # BS-001: Typography tokens — Inter (main) + Zen Dots (brand wordmark).
  google_fonts: ^6.2.1

  # DR-010: SVG rendering for brand logo in top bar.
  flutter_svg: ^2.0.10

  # Runtime BLE permission requests (Android 12+ scan/connect, iOS bluetooth).
  permission_handler: ^11.3.1

  # BS-012: Local notifications for morning read (one daily, local-only).
  # zonedSchedule requires timezone for local time handling.
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # BS-010: Keep screen awake during session recording.
  wakelock_plus: ^1.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Integration testing for corridor guard
  integration_test:
    sdk: flutter

  # FRB codegen emits freezed-style sealed classes for BridgeError
  # variants. Generation-time only.
  freezed: ^2.5.0
  build_runner: ^2.4.0

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

  # PR-I: Release hardening — icon and splash generation.
  # Run: dart run flutter_launcher_icons
  # Run: dart run flutter_native_splash:create
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

# =============================================================================
# PR-I: LAUNCHER ICON CONFIGURATION
#
# PLACEHOLDER: Using Flutter's default adaptive icon colors until final brand
# art lands in the design pass. Replace android_adaptive_* paths when ready.
#
# To regenerate icons after adding brand assets:
#   dart run flutter_launcher_icons
# =============================================================================
flutter_launcher_icons:
  android: true
  ios: true
  # PLACEHOLDER: No logo asset yet — using solid color adaptive icon.
  # Replace with: image_path: "assets/icon/app_icon.png" (1024x1024 recommended)
  remove_alpha_ios: true
  # Adaptive icon for Android 8.0+
  adaptive_icon_background: "#1E3A5F"  # MiValta navy (placeholder)
  # adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  # Fallback for older Android
  # image_path_android: "assets/icon/app_icon_android.png"
  # image_path_ios: "assets/icon/app_icon_ios.png"

# =============================================================================
# PR-I: NATIVE SPLASH SCREEN CONFIGURATION
#
# PLACEHOLDER: Using solid color splash until final brand art lands.
# Replace image paths when brand assets are ready.
#
# To regenerate splash:
#   dart run flutter_native_splash:create
# =============================================================================
flutter_native_splash:
  color: "#1E3A5F"  # MiValta navy (placeholder)
  # image: "assets/splash/splash_logo.png"  # Add when brand art ready
  # branding: "assets/splash/branding.png"  # Optional "Powered by" image
  android: true
  ios: true
  android_12:
    color: "#1E3A5F"
    # image: "assets/splash/splash_logo_android12.png"
    # icon_background_color: "#1E3A5F"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # The compiled knowledge tables that `AdvisorEngine::new` needs at
  # construction time. Copied verbatim from mivalta-rust-engine/
  # compiled_tables.json — not regenerated here.
  assets:
    - assets/compiled_tables.json
    # DEBUG-ONLY simulated-athlete season (replayed through the real ingest
    # path by lib/debug/demo_seeder.dart; only ever invoked under kDebugMode).
    - assets/debug/demo_season.json
    # DR-010: Brand logo for top bar.
    - assets/mivalta-logo.svg

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
