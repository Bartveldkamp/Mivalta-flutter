[package]
name = "mivalta-rust-bridge"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
# cdylib → libmivalta_rust_bridge.so packaged into the APK.
# staticlib → required so flutter_rust_bridge can also build iOS later.
crate-type = ["cdylib", "staticlib"]

[dependencies]
# Pinned to the exact pub.dev release used on the Dart side (2.12.0).
flutter_rust_bridge = "=2.12.0"

# Git-rev pin: rust-engine main @ 81bddd6 (2026-06-09, registry v2.23). Re-pinned
# from 47af641 (v2.20). The 47af641..81bddd6 delta is ADDITIVE on the FFI surface
# (registry diff = +set_rpe_hr_drift_emission, +get_rpe_hr_drift_emission only;
# every method the shim already calls is unchanged), plus internal engine
# improvements: M2 mental_state wired into the readiness_indicator psychological
# axis, the RPE↔HR drift 10th emission, and gatc-josi {state}/{session} string
# slots. No bound-FFI signature changed → the shim in src/api.rs and the FRB
# bindings in lib/src/rust/ need NO regen; this is a pure rev-SHA + Cargo.lock
# update (regenerate the lock on the build executor where ssh resolves).
#
# Earlier (47af641) carried: restart-continuity, worst-state REST, decoupling
# high-intensity block + signal wiring, real-availability duration, sport-guard.
# Bump d79fbd3 -> 793bb44 carries the BLOCKER-1 dashboard honesty fix:
#   - fix(rust): dashboard surfaces unreadable state, never a fabricated
#     reading (PR #205) — get_dashboard/widgets now carry
#     `data_status: state_unavailable` instead of a fabricated "Recovered/green"
#     when persisted vault state is unreadable.
# The d79fbd3..793bb44 delta is gatc-dashboard code (#205) + docs only:
# no gatc-ffi UniFFI surface change and no gatc-vault change, so the FRB
# bindings in lib/src/rust/ and the shim in src/api.rs are unchanged (no
# regen), and the Cargo.lock update is a pure rev-SHA replacement.
#   - d79fbd3 already brought: Health Connect normalizer (#203), encrypted
#     audit ledger at rest (#200), readiness_indicator, DashboardEngine,
#     NormalizerEngine, read_readiness_history, from_persisted_state.
#
# SSH URL because rust-engine is a private repo; CI uses the
# `RUST_ENGINE_DEPLOY_KEY` secret paired with the deploy key on
# rust-engine (see `.github/workflows/smoke-build.yml`).
#
# Local-dev override: to point at a working tree on disk instead of
# refetching from git, set the local patch in `.cargo/config.toml`
# at the repo root (see README — `[patch."ssh://git@github.com/..."]`
# survives `cargo update` because patches live outside the lock file).
gatc-ffi = { git = "ssh://git@github.com/Bartveldkamp/mivalta-rust-engine", rev = "81bddd6" }
# PR-D: gatc-viterbi for UniversalObservation type (process_manual_observation helper)
# PR-E: also needed for normalizer integration
gatc-viterbi = { git = "ssh://git@github.com/Bartveldkamp/mivalta-rust-engine", rev = "81bddd6" }

# Day 3 needs JSON munging at the shim boundary (composing a
# SuggesterContext from engine state) and a "today" date for that
# context. Versions chosen to match what gatc-ffi already resolves to
# in the workspace; cargo will dedupe.
serde_json = "1"
chrono = { version = "0.4", default-features = false, features = ["clock"] }

[dev-dependencies]
tempfile = "3"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "symbols"
