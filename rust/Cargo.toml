[package]
name = "mivalta-rust-bridge"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
# cdylib → libmivalta_rust_bridge.so packaged into the APK.
# staticlib → required so flutter_rust_bridge can also build iOS later.
crate-type = ["cdylib", "staticlib"]

[dependencies]
# Pinned to the exact pub.dev release used on the Dart side (2.12.0).
flutter_rust_bridge = "=2.12.0"

# Git-rev pin (MVP-1 — re-pinned to rust-engine main @ engine_registry v2.18).
# 793bb44 is the current main. It advances from 4dab6cb (the prior pin)
# bringing in, on top of the v2.18 surface already consumed here:
#   - DashboardEngine BLOCKER-1 honesty fix (#205): get_dashboard/widgets now
#     carry `data_status: state_unavailable` and never render a fabricated
#     "Recovered/green" when persisted vault state is unreadable.
#   - Health Connect normalizer (#203): NormalizerEngine::normalize now accepts
#     vendor "health_connect" (Android ingestion parity with Apple Health).
#   - SQLCipher-bundled vault (Entry S): gatc-vault builds rusqlite with the
#     `bundled-sqlcipher` feature (page-encrypted vault.db).
# No UniFFI surface changed across 4dab6cb..793bb44 (the FFI delta is one new
# vendor match-arm + an additive JSON field), so the generated FRB bindings in
# lib/src/rust/ and the shim in src/api.rs are unchanged — no regen needed.
#
# The base v2.18 surface (carried since 4dab6cb):
#   - ViterbiEngine::readiness_indicator() — 4-axis readiness blend headline
#   - DashboardEngine — Tier-2.5 display assembler for the three-zone PULL home
#     (get_dashboard / get_state_widget / get_session_widget / get_context_widget)
#   - NormalizerEngine — multi-vendor normalizer (normalize_observation,
#     classify_source, build_source_overview)
#   - VaultEngine::read_readiness_history() — trend series for dashboard
#   - ViterbiEngine::from_persisted_state() — restore saved HMM on launch
#
# SSH URL because rust-engine is a private repo; CI uses the
# `RUST_ENGINE_DEPLOY_KEY` secret paired with the deploy key on
# rust-engine (see `.github/workflows/smoke-build.yml`).
#
# Local-dev override: to point at a working tree on disk instead of
# refetching from git, set the local patch in `.cargo/config.toml`
# at the repo root (see README — `[patch."ssh://git@github.com/..."]`
# survives `cargo update` because patches live outside the lock file).
gatc-ffi = { git = "ssh://git@github.com/Bartveldkamp/mivalta-rust-engine", rev = "793bb4415fee612ab98c0b72521819d319a9ee02" }

# Day 3 needs JSON munging at the shim boundary (composing a
# SuggesterContext from engine state) and a "today" date for that
# context. Versions chosen to match what gatc-ffi already resolves to
# in the workspace; cargo will dedupe.
serde_json = "1"
chrono = { version = "0.4", default-features = false, features = ["clock"] }

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "symbols"
